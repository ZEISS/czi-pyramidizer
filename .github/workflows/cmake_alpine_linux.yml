---
name: CMake-Alpine-Linux-x64

# Thin CI entry point that validates the Alpine Linux x64 package build by
# calling the shared build-package workflow.

'on':
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  ARCHITECTURE: x64

jobs:
  build:
    uses: ./.github/workflows/build-package.yml
    with:
      target: alpine-linux-x64
