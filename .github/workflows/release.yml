---
name: Release

'on':
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to create or update
        required: true
        type: string
      draft:
        description: Create the release as a draft
        required: false
        default: true
        type: boolean
      prerelease:
        description: Mark the release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  BUILD_TYPE: Release
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  windows-x64:
    runs-on: windows-latest
    env:
      ARCHITECTURE: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: 'C:/vcpkg/installed'
          key: release-vcpkg-x64-windows-
          restore-keys: |
            release-vcpkg-x64-windows-
            vcpkg-x64-windows-

      - name: Install dependencies
        run: |
          vcpkg install opencv4[core,jpeg,png,quirc,tiff,webp]:x64-windows-static
          vcpkg install azure-storage-blobs-cpp:x64-windows-static
          vcpkg install azure-identity-cpp:x64-windows-static
          vcpkg install 'curl[ssl]' --triplet x64-windows-static

      - name: Configure CMake
        shell: bash
        run: |
          mkdir build
          cd build
          cmake -A "${ARCHITECTURE}" -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" -DLIBCZI_BUILD_CURL_BASED_STREAM=ON -DLIBCZI_BUILD_AZURESDK_BASED_STREAM=ON -DLIBCZI_BUILD_PREFER_EXTERNALPACKAGE_LIBCURL=ON -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static ..

      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . --config "${BUILD_TYPE}" -j "$(nproc)"

      - name: Run Unit-Tests
        shell: bash
        run: |
          cd build
          ctest -C "${BUILD_TYPE}"

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p artifact dist
          name="czi-pyramidizer-windows-${ARCHITECTURE,,}-${RELEASE_TAG}"
          mkdir "artifact/${name}"
          cp build/czi-pyramidizer/Release/czi-pyramidizer.exe "artifact/${name}/"
          cp LICENSE THIRD_PARTY_LICENSES.txt README.release.md "artifact/${name}/"
          echo "artifactName=${name}" >> "$GITHUB_ENV"
          echo "artifactPath=${{ github.workspace }}/artifact/${name}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate SPDX SBOM
        shell: pwsh
        run: |
          python release/generate-spdx-sbom.py `
            --metadata release/sbom-components.json `
            --artifact-dir "artifact/$env:artifactName" `
            --artifact-name "$env:artifactName" `
            --platform "windows-x64" `
            --output "artifact/$env:artifactName/$env:artifactName.spdx.json"

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Push-Location "artifact/$env:artifactName"
          Get-ChildItem -File |
            Where-Object { $_.Name -ne "SHA256SUMS" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            } |
            Set-Content -Encoding ascii SHA256SUMS
          Pop-Location

      - name: Archive release package
        shell: pwsh
        run: |
          Compress-Archive -Path "artifact/$env:artifactName/*" -DestinationPath "dist/$env:artifactName.zip"

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          path: dist/${{ env.artifactName }}.zip

  windows-arm64:
    runs-on: windows-11-arm
    env:
      ARCHITECTURE: ARM64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: 'C:/vcpkg/installed'
          key: release-vcpkg-arm64-windows-
          restore-keys: |
            release-vcpkg-arm64-windows-
            vcpkg-arm64-windows-

      - name: Install dependencies
        run: |
          vcpkg install opencv4[core,jpeg,png,quirc,tiff,webp]:arm64-windows-static
          vcpkg install azure-storage-blobs-cpp:arm64-windows-static
          vcpkg install azure-identity-cpp:arm64-windows-static
          vcpkg install 'curl[ssl]' --triplet arm64-windows-static

      - name: Configure CMake
        shell: bash
        run: |
          mkdir build
          cd build
          cmake -A "${ARCHITECTURE}" \
              -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" \
              -DLIBCZI_BUILD_CURL_BASED_STREAM=ON \
              -DLIBCZI_BUILD_AZURESDK_BASED_STREAM=ON \
              -DLIBCZI_BUILD_PREFER_EXTERNALPACKAGE_LIBCURL=ON \
              -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake \
              -DVCPKG_TARGET_TRIPLET=arm64-windows-static ..

      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . --config "${BUILD_TYPE}" -j

      - name: Run Unit-Tests
        shell: bash
        run: |
          cd build
          ctest -C "${BUILD_TYPE}"

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p artifact dist
          name="czi-pyramidizer-windows-${ARCHITECTURE,,}-${RELEASE_TAG}"
          mkdir "artifact/${name}"
          cp build/czi-pyramidizer/Release/czi-pyramidizer.exe "artifact/${name}/"
          cp LICENSE THIRD_PARTY_LICENSES.txt README.release.md "artifact/${name}/"
          echo "artifactName=${name}" >> "$GITHUB_ENV"
          echo "artifactPath=${{ github.workspace }}/artifact/${name}" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate SPDX SBOM
        shell: pwsh
        run: |
          python release/generate-spdx-sbom.py `
            --metadata release/sbom-components.json `
            --artifact-dir "artifact/$env:artifactName" `
            --artifact-name "$env:artifactName" `
            --platform "windows-arm64" `
            --output "artifact/$env:artifactName/$env:artifactName.spdx.json"

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Push-Location "artifact/$env:artifactName"
          Get-ChildItem -File |
            Where-Object { $_.Name -ne "SHA256SUMS" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $_.FullName).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            } |
            Set-Content -Encoding ascii SHA256SUMS
          Pop-Location

      - name: Archive release package
        shell: pwsh
        run: |
          Compress-Archive -Path "artifact/$env:artifactName/*" -DestinationPath "dist/$env:artifactName.zip"

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-arm64
          path: dist/${{ env.artifactName }}.zip

  linux-x64:
    runs-on: ubuntu-latest
    env:
      ARCHITECTURE: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libopencv-dev
          sudo apt-get install -y libssl-dev
          vcpkg install azure-storage-blobs-cpp azure-identity-cpp

      - name: Configure CMake
        shell: bash
        run: |
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" -DLIBCZI_BUILD_CURL_BASED_STREAM=ON -DLIBCZI_BUILD_AZURESDK_BASED_STREAM=ON -DLIBCZI_BUILD_PREFER_EXTERNALPACKAGE_LIBCURL=ON -DCMAKE_TOOLCHAIN_FILE="${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake" ..

      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . --config "${BUILD_TYPE}" -j "$(nproc)"

      - name: Run Unit-Tests
        shell: bash
        run: |
          cd build
          ctest -C "${BUILD_TYPE}"

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p artifact dist
          name="czi-pyramidizer-linux-${ARCHITECTURE,,}-${RELEASE_TAG}"
          mkdir "artifact/${name}"
          cp build/czi-pyramidizer/czi-pyramidizer "artifact/${name}/"
          cp LICENSE THIRD_PARTY_LICENSES.txt README.release.md "artifact/${name}/"
          echo "artifactName=${name}" >> "$GITHUB_ENV"
          echo "artifactPath=${{ github.workspace }}/artifact/${name}" >> "$GITHUB_ENV"

      - name: Generate SPDX SBOM
        shell: bash
        run: |
          python3 release/generate-spdx-sbom.py \
            --metadata release/sbom-components.json \
            --artifact-dir "artifact/${artifactName}" \
            --artifact-name "${artifactName}" \
            --platform "linux-x64" \
            --output "artifact/${artifactName}/${artifactName}.spdx.json"

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd "artifact/${artifactName}"
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%P\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS

      - name: Archive release package
        shell: bash
        run: |
          tar -C artifact -czf "dist/${artifactName}.tar.gz" "${artifactName}"

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          path: dist/${{ env.artifactName }}.tar.gz

  alpine-linux-x64:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    env:
      ARCHITECTURE: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apk add --no-cache \
            bash \
            cmake \
            make \
            g++ \
            ninja \
            git \
            build-base \
            python3-dev \
            linux-headers

      - name: Build azure-sdk-for-cpp
        run: |
          apk add --no-cache perl gcompat zip unzip curl
          mkdir vcpkg
          cd vcpkg
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          VCPKGTOOLCHAINFILE="$(pwd)/scripts/buildsystems/vcpkg.cmake"
          ./bootstrap-vcpkg.sh
          ./vcpkg install azure-storage-blobs-cpp azure-identity-cpp
          echo "VCPKGTOOLCHAINFILE=$VCPKGTOOLCHAINFILE" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          apk add --no-cache openssl-dev
          mkdir opencvbuild
          cd opencvbuild
          git clone --branch 4.10.0 --depth 1 https://github.com/opencv/opencv.git
          git clone --branch 4.10.0 --depth 1 https://github.com/opencv/opencv_contrib.git
          mkdir opencv/build && cd opencv/build
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DOPENCV_EXTRA_MODULES_PATH=../../opencv_contrib/modules -DBUILD_opencv_apps=OFF -DBUILD_TESTS=OFF -DBUILD_PERF_TESTS=OFF -DBUILD_DOCS=OFF ..
          ninja
          ninja install

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake -G Ninja -DCMAKE_BUILD_TYPE="${BUILD_TYPE}" -DLIBCZI_BUILD_CURL_BASED_STREAM=ON -DLIBCZI_BUILD_AZURESDK_BASED_STREAM=ON -DLIBCZI_BUILD_PREFER_EXTERNALPACKAGE_LIBCURL=OFF -DCMAKE_C_FLAGS="-static-libgcc" -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++" -DCMAKE_TOOLCHAIN_FILE="${VCPKGTOOLCHAINFILE}" ..

      - name: Build
        run: |
          cd build
          cmake --build . --config "${BUILD_TYPE}" -j "$(nproc)"

      - name: Run Unit-Tests
        run: |
          cd build
          ctest -C "${BUILD_TYPE}"

      - name: Prepare release files
        run: |
          mkdir -p artifact dist
          name="czi-pyramidizer-alpine-linux-${ARCHITECTURE,,}-${RELEASE_TAG}"
          mkdir "artifact/${name}"
          cp build/czi-pyramidizer/czi-pyramidizer "artifact/${name}/"
          cp LICENSE THIRD_PARTY_LICENSES.txt README.release.md "artifact/${name}/"
          echo "artifactName=${name}" >> "$GITHUB_ENV"
          echo "artifactPath=${{ github.workspace }}/artifact/${name}" >> "$GITHUB_ENV"

      - name: Generate SPDX SBOM
        run: |
          python3 release/generate-spdx-sbom.py \
            --metadata release/sbom-components.json \
            --artifact-dir "artifact/${artifactName}" \
            --artifact-name "${artifactName}" \
            --platform "alpine-linux-x64" \
            --output "artifact/${artifactName}/${artifactName}.spdx.json"

      - name: Generate SHA-256 checksums
        run: |
          cd "artifact/${artifactName}"
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS

      - name: Archive release package
        run: |
          tar -C artifact -czf "dist/${artifactName}.tar.gz" "${artifactName}"

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-alpine-linux-x64
          path: dist/${{ env.artifactName }}.tar.gz

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - windows-x64
      - windows-arm64
      - linux-x64
      - alpine-linux-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-dist
          merge-multiple: true

      - name: Generate archive checksums
        shell: bash
        run: |
          cd release-dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%P\0' \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS

      - name: Prepare release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          ## Release Assets

          This release provides binary packages for:

          - Windows x64
          - Windows ARM64
          - Linux x64
          - Alpine Linux x64

          Each package contains the executable together with:

          - \`LICENSE\`
          - \`THIRD_PARTY_LICENSES.txt\`
          - \`README.release.md\`
          - a package-local SPDX JSON SBOM
          - a package-local \`SHA256SUMS\`

          The release also includes a top-level \`SHA256SUMS\` file for the
          published archive assets.

          ## Compliance Notes

          \`czi-pyramidizer\` may statically link \`libCZI\`. See the project
          documentation for release and relinking guidance:

          - docs/releasing.md
          - docs/release-lgpl-relinking.md
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          DRAFT: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || 'false' }}
          PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || 'false' }}
        shell: bash
        run: |
          draft_flag=""
          prerelease_flag=""
          if [ "$DRAFT" = "true" ]; then
            draft_flag="--draft"
          fi
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-dist/* --clobber
            gh release edit "$RELEASE_TAG" --notes-file release-notes.md $draft_flag $prerelease_flag
          else
            gh release create "$RELEASE_TAG" release-dist/* \
              --title "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --notes-file release-notes.md \
              $draft_flag \
              $prerelease_flag
          fi
