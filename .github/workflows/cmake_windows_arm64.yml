---
name: CMake-Windows-ARM64

# Thin CI entry point that validates the Windows ARM64 package build by calling
# the shared build-package workflow.

'on':
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  ARCHITECTURE: ARM64

jobs:
  build:
    uses: ./.github/workflows/build-package-windows-arm64.yml
    with:
